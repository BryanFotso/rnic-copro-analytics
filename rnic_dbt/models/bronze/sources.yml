            observed_raw_columns: 67
      - name: rnic_2024_t1_csv
        description: Instantane RNIC du premier trimestre 2024, incluant les dates d'immatriculation et de mise a jour.
        config:
          meta:
            file_path: data/raw/2024/RNIC T1 2024.csv
