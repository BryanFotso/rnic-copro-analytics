models:
  - name: rnic_2022_t2
    description: &bronze_model_description >
      Vue bronze d'un unique instantane trimestriel RNIC. Elle conserve sans
      nettoyage les colonnes du CSV en texte et ajoute le fichier, l'annee et le
      trimestre d'observation pour assurer la tracabilite. Une ligne correspond a
      une ligne du fichier source ; les lignes sans numero d'immatriculation sont
      volontairement conservees a ce niveau.
    columns: &bronze_metadata_columns
      - name: source_file
        description: Chemin relatif exact du fichier CSV dont provient la ligne.
        data_tests:
          - not_null
      - name: source_year
        description: Annee de l'instantane, derivee du fichier et non d'une date metier RNIC.
        data_tests:
          - not_null
      - name: source_quarter
        description: Trimestre de l'instantane, derive du fichier et non de la date d'immatriculation.
        data_tests:
          - not_null
  - name: rnic_2022_t3
    description: *bronze_model_description
    columns: *bronze_metadata_columns
  - name: rnic_2022_t4
    description: *bronze_model_description
    columns: *bronze_metadata_columns
  - name: rnic_2023_t1
    description: *bronze_model_description
    columns: *bronze_metadata_columns
