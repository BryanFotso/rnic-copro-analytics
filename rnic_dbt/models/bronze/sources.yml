            file_path: data/raw/2023/RNIC T2 2023.csv
            source_year: 2023
            source_quarter: 2
            observed_rows: 558657
            observed_raw_columns: 67
      - name: rnic_2023_t3_csv
        description: Instantane RNIC du troisieme trimestre 2023.
        config:
          meta:
            file_path: data/raw/2023/RNIC T3 2023.csv
            source_year: 2023
            source_quarter: 3
            observed_rows: 564911
            observed_raw_columns: 67
      - name: rnic_2023_t4_csv
        description: Instantane RNIC du quatrieme trimestre 2023.
        config:
          meta:
            file_path: data/raw/2023/RNIC T4 2023.csv
