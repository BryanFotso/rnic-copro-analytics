version: 2

sources:
  - name: raw_rnic
    description: >
      Inventaire des instantanes trimestriels du Registre national d'immatriculation
      des coproprietes (RNIC) livres sous forme de fichiers CSV par l'Anah. Ces
      sources documentent les fichiers externes lus directement par DuckDB ; elles
      ne correspondent pas a des tables physiques dans un schema `raw`.
    schema: raw
    config:
      meta:
        owner: Anah
        source_documentation: docs/anah-fiche-descriptive-rnc-open-data-versionoctobre2025.pdf
        ingestion_grain: Un fichier CSV par trimestre d'observation
    tables:
      - name: rnic_2022_t2_csv
        description: Instantane RNIC du deuxieme trimestre 2022, premier trimestre disponible dans le projet.
        config:
          meta:
            file_path: data/raw/2022/RNIC T2 2022.csv
            source_year: 2022
            source_quarter: 2
            observed_rows: 526064
            observed_raw_columns: 38
      - name: rnic_2022_t3_csv
        description: Instantane RNIC du troisieme trimestre 2022.
        config:
          meta:
            file_path: data/raw/2022/RNIC T3 2022.csv
            source_year: 2022
            source_quarter: 3
            observed_rows: 532655
            observed_raw_columns: 38
      - name: rnic_2022_t4_csv
        description: Instantane RNIC du quatrieme trimestre 2022, avec ajout des informations cadastrales.
        config:
          meta:
            file_path: data/raw/2022/RNIC T4 2022.csv
            source_year: 2022
            source_quarter: 4
            observed_rows: 541842
            observed_raw_columns: 51
      - name: rnic_2023_t1_csv
        description: Instantane RNIC du premier trimestre 2023, enrichi des indicateurs ACV et PVD.
        config:
          meta:
            file_path: data/raw/2023/RNIC T1 2023.csv
            source_year: 2023
            source_quarter: 1
            observed_rows: 550858
